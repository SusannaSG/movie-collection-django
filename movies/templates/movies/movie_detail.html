<!DOCTYPE html>
<html>

<head>
    <title>{{ movie.title }}</title>

    <style>
        body {
            background: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .top {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        img {
            width: 320px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, .7);
        }

        .info {
            flex: 1;
        }

        h1 {
            color: #4CAF50;
        }

        p {
            color: #ddd;
            line-height: 1.7;
        }

        iframe {
            width: 100%;
            height: 550px;
            border: none;
            margin-top: 30px;
            border-radius: 15px;
        }

        .back {
            color: #4CAF50;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="container">

        <a href="/" class="back">← Back to Movies</a>

        <div class="top">

            <img src="{{ movie.poster_url }}">

            <div class="info">
                <h1>{{ movie.title }}</h1>

                <h3>Release Date</h3>
                <p>{{ movie.release_date }}</p>

                <h3>Description</h3>
                <p>{{ movie.description }}</p>
            </div>

        </div>

        <h2>Trailer</h2>

        {% if movie.trailer_url %}
        <iframe src="https://www.youtube.com/embed/{{ movie.trailer_url|cut:'https://www.youtube.com/watch?v=' }}"
            allowfullscreen>
        </iframe>
        {% endif %}

    </div>

</body>

</html>
