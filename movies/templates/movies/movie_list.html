<!DOCTYPE html>
<html>

<head>
    <title>Movie Collection</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 30px;
            color: #4CAF50;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .card {
            width: 300px;
            background: #222;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, .5);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .card h2 {
            margin: 0;
        }

        a {
            text-decoration: none;
            color: #4CAF50;
            font-size: 18px;
        }

        p {
            color: #ddd;
        }
    </style>
</head>

<body>

    <h1>🎬 Movie Collection</h1>

    <div class="container">

        {% for movie in movies %}

        <div class="card">

            <img src="{{ movie.poster_url }}" alt="{{ movie.title }}">

            <div class="card-body">
                <h2>{{ movie.title }}</h2>

                <p>{{ movie.description|truncatechars:100 }}</p>

                <a href="{% url 'movie_detail' movie.id %}">
                    View Details →
                </a>
            </div>

        </div>

        {% empty %}
        <h2>No movies available</h2>
        {% endfor %}

    </div>

</body>

</html>
